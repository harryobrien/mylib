services:
  postgres:
    image: postgres:16-alpine
    container_name: mylib-db
    environment:
      POSTGRES_DB: mylib
      POSTGRES_USER: mylib
      POSTGRES_PASSWORD: mylib
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mylib -d mylib"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mylib-api
    environment:
      DATABASE_URL: postgres://mylib:mylib@postgres:5432/mylib
      INDEX_PATH: /data/index
      LISTEN_ADDR: 0.0.0.0:3000
      RUST_LOG: info
    expose:
      - "3000"
    volumes:
      - index_data:/data/index
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      args:
        API_URL: http://api:3000
        PUBLIC_API_URL: ${PUBLIC_API_URL:-/api}
    container_name: mylib-web
    expose:
      - "4321"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mylib-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mylib-pgadmin
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin_data:
  index_data:
